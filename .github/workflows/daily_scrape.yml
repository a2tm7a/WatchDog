name: Daily Scraper & Verification

on:
  schedule:
    # Runs at 20:30 UTC = 02:00 AM IST every day (off-peak — avoids
    # allen.in's peak 8-10 AM IST traffic window when bot protection is
    # most aggressive and scraping is more likely to be rate-limited).
    - cron: '30 20 * * *'
  workflow_dispatch:     # also allows manual trigger from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60    # optimised run targets ~20-30 min; 60 min is a safe ceiling

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. Python deps ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Chromium + OS libs ──────────────────────────────────────
      # Only install Chromium; WebKit is a rarely-needed fallback and
      # downloading it adds ~2-3 min of unnecessary setup time.
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Scrape ──────────────────────────────────────────────────
      - name: Run scraper
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          WATCHDOG_WAIT_MS: "20000"
          WATCHDOG_RETRIES: "1"
          WATCHDOG_RETRY_BACKOFF_MS: "10000"
          WATCHDOG_NAV_JITTER_MS: "2000"
          WATCHDOG_MAX_WORKERS: "3"
          WATCHDOG_CI_SERIAL_VIEWPORTS: "false"
          WATCHDOG_FAIL_ON_EMPTY: "false"
          WATCHDOG_ARTIFACT_DIR: "artifacts/watchdog"
          # Optional overrides (add as Secrets if you need them):
          # EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          # EMAIL_SEND_ON: errors          # always | errors | never
        run: python3 scraper.py

      # ── 6. Upload report as Actions artifact (30-day retention) ───
      - name: Upload report
        if: always()    # upload even if scraper exits with errors
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchdog-artifacts-${{ github.run_number }}
          path: artifacts/watchdog/
          if-no-files-found: warn
          retention-days: 30
